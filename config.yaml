# Skillberry-store runtime configuration.
# See config.yaml.example for the full annotated reference.
#
# Loaded once at startup (default ./config.yaml, or set SBS_CONFIG_FILE).
# Per matched endpoint, auth resolves in order:
#   1. api_key   -> sent as Authorization: Bearer <key>
#   2. login_url -> forced-reauthentication: 401 + this URL; user retries with
#                   header X-Endpoint-Token: <token>
#   3. (neither) -> OAuth discovery (/.well-known/oauth-authorization-server)
# No match -> API_KEY env var fallback (or anonymous).
endpoints:
  # github.com has no OAuth discovery metadata, so it gets an explicit login_url
  # (GitHub's token page). On import: 401 + this URL; user creates a token and
  # retries sending header  X-Endpoint-Token: <token>.
  - endpoint: github.com
    login_url: https://github.com/settings/tokens
