[metadata]
name = llm-client
version = 0.1.0
description = A flexible, extensible framework for working with any large-language-model (LLM) provider in a uniform way
long_description = file: README.md
long_description_content_type = text/markdown
url = https://github.ibm.com/skillberry/llm-client
author = Skillberry Team
license = Apache-2.0
license_file = LICENSE
classifiers =
    Intended Audience :: Developers
    License :: OSI Approved :: Apache Software License
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3.9
    Programming Language :: Python :: 3.10
    Programming Language :: Python :: 3.11
    Programming Language :: Python :: 3.12

[options]
packages = find:
python_requires = >=3.9
install_requires =
    pydantic>=2.0.0
    jsonschema>=4.0.0

[options.extras_require]
litellm = litellm>=1.0.0
openai = openai>=1.0.0
watsonx = ibm-watsonx-ai>=1.0.0
rits = litellm>=1.0.0
ollama = litellm>=1.0.0
all = 
    litellm>=1.0.0
    openai>=1.0.0
    ibm-watsonx-ai>=1.0.0
dev = 
    pytest>=7.0.0
    pytest-asyncio>=0.21.0
    pytest-cov>=4.0.0
    black>=23.0.0
    isort>=5.12.0
    flake8>=6.0.0
    mypy>=1.0.0
    pre-commit>=3.0.0
docs = 
    sphinx>=5.0.0
    sphinx-rtd-theme>=1.2.0
    sphinx-autodoc-typehints>=1.23.0

[options.packages.find]
exclude =
    tests*
    llm_examples*
    