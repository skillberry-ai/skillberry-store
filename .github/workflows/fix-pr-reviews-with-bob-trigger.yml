# ============================================================================
# GitHub Workflow: Fix PR Reviews with Bob - Trigger
# ============================================================================
#
# PURPOSE:
# This is a dummy workflow that triggers the actual fix-pr-reviews-with-bob workflow.
# It's necessary because pull_request_review events from forked repositories don't
# have access to repository secrets. By using workflow_run, we can work around this
# limitation and access secrets in the triggered workflow.
#
# WORKFLOW CHAIN:
# 1. This workflow (pull_request_review trigger) - runs on PR review submission
# 2. fix-pr-reviews-with-bob.yml (workflow_run trigger) - has access to secrets
#
# ============================================================================

name: Fix PR Reviews with Bob - Trigger

on:
  pull_request_review:
    types: [submitted]

jobs:
  trigger-bob-workflow:
    # Only run for reviews with comments on PRs labeled with 'fix-with-bob'
    if: |
      (github.event.review.state == 'commented' || github.event.review.state == 'changes_requested') &&
      contains(github.event.pull_request.labels.*.name, 'fix-with-bob')
    runs-on: ubuntu-latest
    
    steps:
      - name: Save PR and Review Information
        id: save_info
        run: |
          echo "This is a dummy workflow that triggers the actual fix-pr-reviews-with-bob workflow."
          echo "It's necessary because pull_request_review events from forked repositories"
          echo "don't have access to repository secrets."
          echo ""
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "Review ID: ${{ github.event.review.id }}"
          echo "Reviewer: ${{ github.event.review.user.login }}"
          
          # Save to outputs for the summary
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "review_id=${{ github.event.review.id }}" >> $GITHUB_OUTPUT
          echo "reviewer=${{ github.event.review.user.login }}" >> $GITHUB_OUTPUT
          echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "head_ref=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
          echo "head_repo=${{ github.event.pull_request.head.repo.full_name }}" >> $GITHUB_OUTPUT
          echo "review_state=${{ github.event.review.state }}" >> $GITHUB_OUTPUT
          
          cat > pr-review-context.json <<'JSON'
          {
            "pr_number": ${{ github.event.pull_request.number }},
            "review_id": ${{ github.event.review.id }},
            "reviewer": "${{ github.event.review.user.login }}",
            "pr_title": "${{ github.event.pull_request.title }}",
            "head_ref": "${{ github.event.pull_request.head.ref }}",
            "head_repo": "${{ github.event.pull_request.head.repo.full_name }}",
            "review_state": "${{ github.event.review.state }}"
          }
          JSON
          
          cat pr-review-context.json
      
      - name: Upload PR review context
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-context
          path: pr-review-context.json
          retention-days: 1
      
      - name: Create Summary
        run: |
          echo "### PR Review Trigger Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR**: #${{ steps.save_info.outputs.pr_number }} - ${{ steps.save_info.outputs.pr_title }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Review ID**: ${{ steps.save_info.outputs.review_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Reviewer**: @${{ steps.save_info.outputs.reviewer }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Review State**: ${{ steps.save_info.outputs.review_state }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Head Ref**: ${{ steps.save_info.outputs.head_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Head Repo**: ${{ steps.save_info.outputs.head_repo }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This will trigger the main workflow with access to secrets." >> $GITHUB_STEP_SUMMARY

# Made with Bob
