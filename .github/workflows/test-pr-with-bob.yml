  checks: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: test-pr-with-bob-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  call-test-pr:
    uses: skillberry-ai/.github/.github/workflows/test-pr-with-bob.yml@main
    secrets: inherit

