# ============================================================================
# GitHub Workflow: Automatic Issue Labeling
# ============================================================================
#
# PURPOSE:
# This workflow automatically labels new GitHub issues using IBM Bob Shell, an AI-powered
# coding assistant. When a new issue is created, this workflow:
# 1. Fetches the current repository labels and their descriptions
# 2. Analyzes the issue content using Bob Shell
# 3. Selects appropriate labels based on the issue description
# 4. Applies the selected labels to the issue
# 5. Adds 'fix-with-bob' label only if the issue is simple enough for Bob to fix
#
# WORKFLOW STEPS:
# 1. Trigger: Activated when a new issue is opened
# 2. Setup: Checkout repository and install Node.js 22 (required for Bob Shell)
# 3. Install Bob Shell: Download and install Bob Shell using the official installer
# 4. Authentication: Configure Bob Shell with BOBSHELL_API_KEY from GitHub secrets
# 5. Fetch Labels: Retrieve current repository labels dynamically via GitHub API
# 6. Context Gathering: Extract issue details (number, title, description)
# 7. Bob Execution: Run Bob Shell with a prompt to analyze and select labels
# 8. Apply Labels: Add the selected labels to the issue
#
# LABEL SELECTION CRITERIA:
# - Bob Shell analyzes the issue content against available label descriptions
# - Multiple labels can be applied if relevant
# - 'fix-with-bob' is only added if:
#   * The issue describes a coding task
#   * The implementation is straightforward and not complex
#   * Bob Shell can likely fix it with simple code changes
#
# REQUIREMENTS:
# - GitHub Secrets (must be configured in repository settings):
#   * BOBSHELL_API_KEY: API key for Bob Shell authentication
# - Permissions: Workflow needs write access to issues
#
# USAGE:
# This workflow runs automatically when any new issue is created.
# No manual intervention required.
#
# ============================================================================

name: Label New Issues

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to label'
        required: true
        type: number

jobs:
  auto-label-issues:
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Shallow clone is sufficient
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Bob Shell
        run: |
          echo "Installing Bob Shell..."
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm

          # Verify installation
          if command -v bob &> /dev/null; then
            echo "Bob Shell installed successfully"
            bob --version
          else
            echo "Bob Shell installation failed"
            exit 1
          fi
      
      - name: Authenticate Bob Shell
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Configuring Bob Shell authentication..."
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY secret is not set"
            exit 1
          fi
          # Bob Shell uses BOBSHELL_API_KEY environment variable for authentication
          echo "Bob Shell authentication configured successfully"
      
      - name: Fetch Repository Labels
        id: labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching repository labels..."
          LABELS_JSON=$(gh api repos/${{ github.repository }}/labels --paginate)
          
          # Save labels to file for Bob Shell to read
          echo "${LABELS_JSON}" > /tmp/repo_labels.json
          
          # Create a formatted list for the prompt
          LABELS_LIST=$(echo "${LABELS_JSON}" | jq -r '.[] | "- \(.name): \(.description // "No description")"')
          
          # Save to output using heredoc to handle multiline
          echo "labels_list<<EOF" >> $GITHUB_OUTPUT
          echo "${LABELS_LIST}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "✓ Fetched $(echo "${LABELS_JSON}" | jq '. | length') labels"
      
      - name: Get Issue Details
        id: issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine issue number based on trigger type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="${{ inputs.issue_number }}"
          else
            ISSUE_NUMBER="${{ github.event.issue.number }}"
          fi
          
          echo "issue_number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT
          
          # Fetch issue details from GitHub API for workflow_dispatch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_DATA=$(gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER})
            ISSUE_TITLE=$(echo "${ISSUE_DATA}" | jq -r '.title')
            ISSUE_BODY=$(echo "${ISSUE_DATA}" | jq -r '.body // ""')
          else
            ISSUE_TITLE="${{ github.event.issue.title }}"
            ISSUE_BODY="${{ github.event.issue.body }}"
          fi
          
          # Save issue title and body to output
          echo "issue_title<<TITLE_EOF" >> $GITHUB_OUTPUT
          echo "${ISSUE_TITLE}" >> $GITHUB_OUTPUT
          echo "TITLE_EOF" >> $GITHUB_OUTPUT
          
          echo "issue_body<<BODY_EOF" >> $GITHUB_OUTPUT
          echo "${ISSUE_BODY}" >> $GITHUB_OUTPUT
          echo "BODY_EOF" >> $GITHUB_OUTPUT
      
      - name: Analyze Issue and Select Labels
        id: analyze
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 2
          retry_wait_seconds: 10
          command: |
            # Create a comprehensive prompt for Bob Shell
            cat > /tmp/labeling_prompt.txt << 'PROMPT_EOF'
            You are analyzing a GitHub issue to select appropriate labels.

            ISSUE #${{ steps.issue.outputs.issue_number }}: ${{ steps.issue.outputs.issue_title }}

            ISSUE DESCRIPTION:
            ${{ steps.issue.outputs.issue_body }}

            AVAILABLE LABELS:
            ${{ steps.labels.outputs.labels_list }}

            TASK:
            Analyze the issue and select the most appropriate labels from the available labels list.
            
            LABEL SELECTION RULES:
            1. Select ALL relevant labels that apply to this issue
            2. Use label descriptions to guide your selection
            3. CRITICAL: You MUST ONLY use labels from the AVAILABLE LABELS list above. DO NOT invent or create new labels.
            4. CRITICAL: Every label you suggest MUST exist exactly as shown in the AVAILABLE LABELS list above
            5. CRITICAL: Do NOT add labels like "---output---" or any other invented labels
            6. For the 'fix-with-bob' label specifically:
               - ONLY add it if the issue describes a coding task
               - ONLY add it if the implementation is straightforward and not complex
               - ONLY add it if you believe Bob Shell can fix it with simple code changes
               - DO NOT add it for complex features, architectural changes, or unclear requirements
            7. Common label mappings (only use if they exist in AVAILABLE LABELS):
               - 'bug': Issue reports something broken or not working correctly
               - 'enhancement': Issue requests a new feature or improvement
               - 'documentation': Issue relates to docs, README, or comments
               - 'question': Issue asks for clarification or information
               - 'security': Issue relates to security vulnerabilities or concerns
               - 'automation': Issue relates to CI/CD, workflows, or automated processes
               - 'good first issue': Issue is simple and suitable for newcomers
               - 'help wanted': Issue needs community assistance

            OUTPUT FORMAT:
            Respond with ONLY a JSON array of label names to apply. Nothing else.
            Example: ["bug", "documentation"]
            Example: ["enhancement", "fix-with-bob"]
            Example: ["question"]

            If no labels from the available list are appropriate, respond with an empty array: []
            PROMPT_EOF

            # Run Bob Shell with the prompt
            RESPONSE=$(bob --accept-license -p "$(cat /tmp/labeling_prompt.txt)")
            
            echo "Bob Shell Response:"
            echo "${RESPONSE}"
            
            # Get list of valid repository labels
            VALID_LABELS=$(cat /tmp/repo_labels.json | jq -r '.[].name')
            echo "Valid repository labels:"
            echo "${VALID_LABELS}"
            
            # Extract JSON array from response (Bob might add explanation text)
            # First, try to extract from ---output--- section if it exists
            if echo "${RESPONSE}" | grep -q '---output---'; then
              LABELS_JSON=$(echo "${RESPONSE}" | sed -n '/---output---/,/---output---/p' | grep -oP '\["[^"]*"(?:,\s*"[^"]*")*\]' | head -1)
              echo "Extracted from output section: ${LABELS_JSON}"
            fi
            
            # If that didn't work, try to find a valid JSON array with quoted strings
            if [ -z "${LABELS_JSON}" ]; then
              echo "Trying to extract JSON array from full response..."
              # Look for ["..."] pattern and take the last occurrence (most likely to be the final answer)
              LABELS_JSON=$(echo "${RESPONSE}" | grep -oP '\["[^"]*"(?:,\s*"[^"]*")*\]' | tail -1)
            fi
            
            # Validate the extracted JSON
            if [ -n "${LABELS_JSON}" ]; then
              # Remove any trailing text after the closing bracket
              LABELS_JSON=$(echo "${LABELS_JSON}" | grep -oP '^\[.*?\]')
              
              # Validate with jq
              if ! echo "${LABELS_JSON}" | jq empty 2>/dev/null; then
                echo "Warning: Extracted JSON is invalid, trying to clean it..."
                # Try to extract just the array part before any extra text
                LABELS_JSON=$(echo "${LABELS_JSON}" | sed 's/\]\[.*/]/')
                
                if ! echo "${LABELS_JSON}" | jq empty 2>/dev/null; then
                  echo "Warning: Could not extract valid labels JSON from response"
                  LABELS_JSON="[]"
                fi
              fi
            else
              echo "Warning: Could not extract labels JSON from response"
              LABELS_JSON="[]"
            fi
            
            echo "Extracted labels (before validation): ${LABELS_JSON}"
            
            # Validate each label against repository labels
            VALIDATED_LABELS="[]"
            INVALID_LABELS=""
            
            if [ "${LABELS_JSON}" != "[]" ]; then
              # Extract labels from JSON and validate each one
              VALIDATED_LABELS=$(echo "${LABELS_JSON}" | jq -c --argjson valid "$(echo "${VALID_LABELS}" | jq -R -s -c 'split("\n") | map(select(length > 0))')" '
                map(select(. as $label | $valid | index($label) != null))
              ')
              
              # Find invalid labels for reporting
              INVALID_LABELS=$(echo "${LABELS_JSON}" | jq -r --argjson valid "$(echo "${VALID_LABELS}" | jq -R -s -c 'split("\n") | map(select(length > 0))')" '
                map(select(. as $label | $valid | index($label) == null)) | join(", ")
              ')
            fi
            
            # Report invalid labels
            if [ -n "${INVALID_LABELS}" ] && [ "${INVALID_LABELS}" != "" ]; then
              echo "⚠️ Warning: Bob suggested invalid labels that don't exist in repository: ${INVALID_LABELS}"
            fi
            
            echo "Validated labels: ${VALIDATED_LABELS}"
            
            # Save to output
            echo "selected_labels=${VALIDATED_LABELS}" >> $GITHUB_OUTPUT
            
            # Also save to file for next step
            echo "${VALIDATED_LABELS}" > /tmp/selected_labels.json
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
      
      - name: Apply Labels to Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS_JSON=$(cat /tmp/selected_labels.json)
          
          # Check if we have any labels to apply
          LABEL_COUNT=$(echo "${LABELS_JSON}" | jq '. | length')
          
          if [ "${LABEL_COUNT}" -eq 0 ]; then
            echo "No labels selected by Bob Shell"
            exit 0
          fi
          
          echo "Applying ${LABEL_COUNT} label(s) to issue #${{ steps.issue.outputs.issue_number }}"
          
          # Get list of valid repository labels
          REPO_LABELS=$(cat /tmp/repo_labels.json | jq -r '.[].name')
          
          # Validate and filter selected labels
          VALID_LABELS=()
          INVALID_LABELS=()
          
          while IFS= read -r label; do
            if echo "${REPO_LABELS}" | grep -qx "${label}"; then
              VALID_LABELS+=("${label}")
            else
              INVALID_LABELS+=("${label}")
            fi
          done < <(echo "${LABELS_JSON}" | jq -r '.[]')
          
          # Report invalid labels
          if [ ${#INVALID_LABELS[@]} -gt 0 ]; then
            echo "⚠️ Warning: The following labels don't exist in the repository and will be skipped:"
            printf '%s\n' "${INVALID_LABELS[@]}"
          fi
          
          # Apply valid labels
          if [ ${#VALID_LABELS[@]} -eq 0 ]; then
            echo "No valid labels to apply"
            exit 0
          fi
          
          # Convert array to comma-separated list for gh cli
          LABELS_LIST=$(IFS=,; echo "${VALID_LABELS[*]}")
          
          # Apply labels using gh cli
          gh issue edit ${{ steps.issue.outputs.issue_number }} \
            --add-label "${LABELS_LIST}"
          
          echo "✓ Successfully applied labels: ${LABELS_LIST}"
      
      - name: Comment on Issue
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS_JSON=$(cat /tmp/selected_labels.json)
          LABEL_COUNT=$(echo "${LABELS_JSON}" | jq '. | length')
          
          if [ "${LABEL_COUNT}" -gt 0 ]; then
            LABELS_LIST=$(echo "${LABELS_JSON}" | jq -r '.[]' | sed 's/^/`/' | sed 's/$/`/' | tr '\n' ',' | sed 's/,/, /g' | sed 's/, $//')
            
            gh issue comment ${{ steps.issue.outputs.issue_number }} \
              --body "🤖 **Automatic Labeling**

            Bob Shell has analyzed this issue and applied the following label(s): ${LABELS_LIST}

            These labels were selected based on the issue content and available label descriptions. If you believe the labels are incorrect, feel free to modify them manually."
          fi
      
      - name: Handle Errors
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} \
            --body "⚠️ **Automatic Labeling Failed**

            Bob Shell encountered an error while trying to label this issue. Please add labels manually.
            
            Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
