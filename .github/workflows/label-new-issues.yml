name: Label New Issues

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to label'
        required: true
        type: number

jobs:
  call-label-issues:
    uses: skillberry-ai/.github/.github/workflows/label-new-issues.yml@main
    secrets: inherit

