# ============================================================================
# GitHub Workflow: Test PR with Bob - Trigger
# ============================================================================
#
# PURPOSE:
# This is the unprivileged trigger workflow for Bob PR testing.
# It runs on pull_request events, verifies that the PR has the configured label,
# and uploads a small PR context artifact. It does NOT checkout PR code, use
# repository secrets, run tests, or write to the PR.
#
# The privileged companion workflow, "Test PR with Bob", is triggered by
# workflow_run, downloads this artifact, then performs the Bob/test/report steps.
# This split follows GitHub's recommended pattern for testing PR code while still
# allowing a second workflow to comment on the PR.
#
# USAGE:
# Add the label `test-with-bob` to a PR. The workflow also reruns on synchronize,
# reopened, and ready_for_review while the label remains attached.
# ============================================================================

name: Test PR with Bob - Trigger

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  collect-pr-context:
    if: >-
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'test-with-bob')
    runs-on: ubuntu-latest

    steps:
      - name: Write PR context artifact
        run: |
          mkdir -p pr-test-context
          cat > pr-test-context/context.json <<'JSON'
          {
            "pr_number": ${{ github.event.pull_request.number }},
            "pr_title": ${{ toJson(github.event.pull_request.title) }},
            "pr_body": ${{ toJson(github.event.pull_request.body) }},
            "pr_url": ${{ toJson(github.event.pull_request.html_url) }},
            "base_ref": ${{ toJson(github.event.pull_request.base.ref) }},
            "base_sha": ${{ toJson(github.event.pull_request.base.sha) }},
            "head_ref": ${{ toJson(github.event.pull_request.head.ref) }},
            "head_sha": ${{ toJson(github.event.pull_request.head.sha) }},
            "head_repo": ${{ toJson(github.event.pull_request.head.repo.full_name) }},
            "head_owner": ${{ toJson(github.event.pull_request.head.repo.owner.login) }},
            "repository": ${{ toJson(github.repository) }},
            "actor": ${{ toJson(github.actor) }},
            "labels": ${{ toJson(github.event.pull_request.labels.*.name) }}
          }
          JSON
          cat pr-test-context/context.json

      - name: Upload PR context
        uses: actions/upload-artifact@v6
        with:
          name: pr-test-context
          path: pr-test-context/context.json
          retention-days: 7
