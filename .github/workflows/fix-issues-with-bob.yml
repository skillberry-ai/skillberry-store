# ============================================================================
# GitHub Workflow: Fix Issues with Bob
# ============================================================================
#
# PURPOSE:
# This workflow automatically fixes GitHub issues using IBM Bob Shell, an AI-powered
# coding assistant. When an issue is labeled with 'fix-with-bob', this workflow:
# 1. Analyzes the issue description and requirements
# 2. Uses Bob Shell to generate code changes that address the issue
# 3. Creates a pull request with the proposed fixes
# 4. Provides feedback on the issue with status updates
#
# WORKFLOW STEPS:
# 1. Trigger: Activated when 'fix-with-bob' label is added to an issue
# 2. Setup: Checkout repository and install Node.js 22 (required for Bob Shell)
# 3. Install Bob Shell: Download and install Bob Shell using the official installer
# 4. Authentication: Configure Bob Shell with BOBSHELL_API_KEY from GitHub secrets
# 5. Context Gathering: Extract issue details (number, title, description)
# 6. Git Configuration: Configure Git user and add 'eranra' remote for fork-based workflow
# 7. Branch Creation: Create a new branch named 'fix-issue-{number}'
# 8. Bob Execution: Run Bob Shell with a prompt containing the issue context
# 9. Change Detection: Check if Bob made any code modifications
# 10. Push to Fork: Commit and push changes to the 'eranra' remote repository
# 11. PR Creation: Create a pull request from the fork to the upstream repository
# 12. Feedback: Comment on the issue with workflow status (success/failure/no changes)
#
# FORK-BASED WORKFLOW:
# This workflow uses a fork-based approach where:
# - Changes are pushed to the 'eranra' fork (https://github.com/eranra/skillberry-store.git)
# - Pull requests are created from 'eranra:fix-issue-{number}' to the upstream 'main' branch
# - This allows the workflow to operate without direct push access to protected branches
# - Authentication uses a Personal Access Token (PAT) with 'repo' scope
#
# REQUIREMENTS:
# - GitHub Secrets (must be configured in repository settings):
#   * BOBSHELL_API_KEY: API key for Bob Shell authentication
#   * ERANRA_GITHUB_TOKEN: Personal Access Token with 'repo' scope for pushing to eranra fork
# - Label: 'fix-with-bob' must exist in the repository
# - Permissions: Workflow needs write access to issues, PRs, and repository contents
#
# SETUP INSTRUCTIONS:
# 1. Create a Personal Access Token (PAT) in the eranra GitHub account:
#    - Log in to GitHub as the 'eranra' user
#    - Go to Settings > Developer settings > Personal access tokens > Tokens (classic)
#    - Click "Generate new token (classic)"
#    - Give it a descriptive name (e.g., "Bob Shell Workflow - skillberry-store")
#    - Select the 'repo' scope (this grants full control of private repositories)
#    - Set an appropriate expiration date (or no expiration for long-term use)
#    - Click "Generate token" and copy the token value immediately
# 2. Add the token as a secret in the upstream repository (skillberry-ai/skillberry-store):
#    - Go to repository Settings > Secrets and variables > Actions
#    - Click "New repository secret"
#    - Name: ERANRA_GITHUB_TOKEN
#    - Value: Paste the PAT from step 1
#    - Click "Add secret"
# 3. Ensure BOBSHELL_API_KEY is also configured as a secret
# 4. Verify the eranra account has write access to the fork (eranra/skillberry-store)
#
# TROUBLESHOOTING TOKEN ISSUES:
# If you see "permission denied" errors when pushing:
# - Verify the token was created by the 'eranra' user (not another account)
# - Ensure the token has the 'repo' scope selected
# - Check that the token hasn't expired
# - Confirm the eranra user owns the fork repository
# - Try regenerating the token if issues persist
#
# USAGE:
# Simply add the 'fix-with-bob' label to any issue you want Bob to attempt to fix.
# The workflow will automatically trigger and process the issue.
#
# NOTE:
# Bob Shell's exact CLI interface may require adjustments. The current implementation
# pipes a prompt file to Bob via stdin. Consult Bob Shell documentation for the
# most accurate command syntax.
# ============================================================================

name: Fix Issues with Bob

on:
  issues:
    types: [labeled]

jobs:
  fix-issues-with-bob:
    # Only run when the 'fix-with-bob' label is added
    if: github.event.label.name == 'fix-with-bob'
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      pull-requests: write
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Bob Shell
        run: |
          echo "Installing Bob Shell..."
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm

          # Verify installation
          if command -v bob &> /dev/null; then
            echo "Bob Shell installed successfully"
            bob --version
          else
            echo "Bob Shell installation failed"
            exit 1
          fi
      
      - name: Authenticate Bob Shell
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Configuring Bob Shell authentication..."
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY secret is not set"
            exit 1
          fi
          # Bob Shell uses BOBSHELL_API_KEY environment variable for authentication
          echo "Bob Shell authentication configured successfully"
      
      - name: Get Issue Details
        id: issue
        run: |
          echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          echo "issue_title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
          echo "issue_body<<EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.issue.body }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Configure Git
        env:
          ERANRA_TOKEN: ${{ secrets.ERANRA_GITHUB_TOKEN }}
        run: |
          # Verify ERANRA_GITHUB_TOKEN is configured
          if [ -z "$ERANRA_TOKEN" ]; then
            echo "Error: ERANRA_GITHUB_TOKEN secret is not set"
            echo "Please configure this secret in repository settings with a PAT that has 'repo' scope"
            exit 1
          fi
          echo "ERANRA_GITHUB_TOKEN is configured ✓"
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add eranra remote for pushing branches using HTTPS with token authentication
          # The token must have 'repo' scope to push to the fork
          git remote add eranra https://${ERANRA_TOKEN}@github.com/eranra/skillberry-store.git || true
          git remote -v
          
          # Test token permissions by fetching from the remote
          echo "Testing token permissions..."
          if git ls-remote eranra &> /dev/null; then
            echo "✓ Token has read access to eranra/skillberry-store"
          else
            echo "✗ Token does not have read access to eranra/skillberry-store"
            echo "Please verify the token has 'repo' scope and access to the fork"
            exit 1
          fi
      
      - name: Create Branch for Fix
        run: |
          BRANCH_NAME="fix-issue-${{ steps.issue.outputs.issue_number }}"
          git checkout -b "${BRANCH_NAME}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
      
      - name: Execute Bob to Fix Issue
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.issue_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a comprehensive prompt for Bob Shell
          PROMPT="Fix GitHub issue #${ISSUE_NUMBER}: ${{ steps.issue.outputs.issue_title }}

          Repository: ${{ github.repository }}
          Issue URL: ${{ github.event.issue.html_url }}

          Issue Description:
          ${{ steps.issue.outputs.issue_body }}

          Please analyze this issue and make all necessary code changes to fix it.
          Ensure the changes are complete, follow best practices, and resolve the issue."

          # --accept-license: required on first run in a fresh CI environment
          # --yolo: required to enable file writing (disabled by default)
          bob --accept-license --yolo -p "${PROMPT}"
      
      - name: Check for Changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi
      
      - name: Commit and Push Changes
        if: steps.changes.outputs.has_changes == 'true'
        env:
          ERANRA_TOKEN: ${{ secrets.ERANRA_GITHUB_TOKEN }}
        run: |
          git add -A
          git reset .bob/ || true
          git commit -m "Fix issue #${{ steps.issue.outputs.issue_number }}: ${{ steps.issue.outputs.issue_title }}"
          
          echo "Pushing to eranra remote..."
          if git push eranra "${BRANCH_NAME}"; then
            echo "✓ Branch ${BRANCH_NAME} pushed successfully to eranra remote"
          else
            echo "✗ Failed to push to eranra remote"
            echo ""
            echo "TROUBLESHOOTING:"
            echo "1. Verify ERANRA_GITHUB_TOKEN has 'repo' scope (full control of private repositories)"
            echo "2. Ensure the token belongs to the 'eranra' GitHub account"
            echo "3. Check that the token hasn't expired"
            echo "4. Verify the eranra account has write access to eranra/skillberry-store"
            echo ""
            echo "To regenerate the token:"
            echo "1. Go to https://github.com/settings/tokens"
            echo "2. Generate new token (classic) with 'repo' scope"
            echo "3. Update the ERANRA_GITHUB_TOKEN secret in repository settings"
            exit 1
          fi
      
      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create PR from the eranra fork to the upstream repository
          gh pr create \
            --repo ${{ github.repository }} \
            --title "Fix: Issue #${{ steps.issue.outputs.issue_number }} - ${{ steps.issue.outputs.issue_title }}" \
            --body "This PR was automatically generated by Bob Shell to fix issue #${{ steps.issue.outputs.issue_number }}.

          ## Issue Details
          ${{ steps.issue.outputs.issue_body }}

          ## Changes
          Bob Shell analyzed the issue and applied the following fixes:
          $(git diff origin/main...HEAD --stat)

          Closes #${{ steps.issue.outputs.issue_number }}" \
            --base main \
            --head "eranra:${BRANCH_NAME}"
      
      - name: Comment on Issue
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} \
            --body "🤖 Bob Shell has analyzed this issue and created a pull request with a proposed fix. Please review the changes."
      
      - name: Comment on Issue - No Changes
        if: steps.changes.outputs.has_changes == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} \
            --body "🤖 Bob Shell analyzed this issue but did not generate any code changes. Manual intervention may be required."
      
      - name: Handle Errors
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} \
            --body "❌ Bob Shell encountered an error while trying to fix this issue. Please check the workflow logs for details."

# Made with Bob
