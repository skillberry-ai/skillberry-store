# ============================================================================
# GitHub Workflow: Fix PR Reviews with Bob
# ============================================================================
#
# PURPOSE:
# This workflow automatically addresses PR review comments using IBM Bob Shell.
# When a pull request review is submitted with comments, this workflow:
# 1. Analyzes all review comments on the PR
# 2. Uses Bob Shell to make code changes addressing the feedback
# 3. Commits the changes to the PR branch
# 4. Responds to each review comment with Bob's actions
#
# WORKFLOW STEPS:
# 1. Trigger: Activated when a PR review is submitted
# 2. Setup: Checkout PR branch and install Node.js 22 (required for Bob Shell)
# 3. Install Bob Shell: Download and install Bob Shell using the official installer
# 4. Authentication: Configure Bob Shell with BOBSHELL_API_KEY from GitHub secrets
# 5. Context Gathering: Extract PR details and all review comments
# 6. Git Configuration: Configure Git user for commits
# 7. Bob Execution: Run Bob Shell with a prompt containing all review feedback
# 8. Change Detection: Check if Bob made any code modifications
# 9. Push Changes: Commit and push changes to the PR branch
# 10. Respond to Comments: Reply to each review comment with Bob's actions
#
# REQUIREMENTS:
# - GitHub Secrets (must be configured in repository settings):
#   * BOBSHELL_API_KEY: API key for Bob Shell authentication
#   * SKILLBERRY_BOT_TOKEN: Personal access token with repo permissions
# - Permissions: Workflow needs write access to PRs and repository contents
#
# USAGE:
# This workflow automatically triggers when a PR review is submitted.
# Bob will attempt to address all review comments in the submitted review.
#
# ============================================================================

name: Fix PR Reviews with Bob

on:
  workflow_run:
    workflows: ["Fix PR Reviews with Bob - Trigger"]
    types:
      - completed

jobs:
  fix-pr-reviews-with-bob:
    # Only run if the trigger workflow completed successfully
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      pull-requests: write
      contents: write
      deployments: write
      statuses: write
      actions: write
      checks: read    

    steps:
      - name: Get PR details from workflow run
        id: get_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
          script: |
            const workflowRun = context.payload.workflow_run;
            
            core.info(`Workflow run ID: ${workflowRun.id}`);
            core.info(`Workflow run head SHA: ${workflowRun.head_sha}`);
            core.info(`Workflow run head branch: ${workflowRun.head_branch}`);
            
            // List all open PRs and find the one with matching head branch
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            core.info(`Found ${pulls.length} open PRs`);
            
            // Find PR with matching head branch
            const pr = pulls.find(p => p.head.ref === workflowRun.head_branch);
            
            if (!pr) {
              core.setFailed(`No open PR found for branch: ${workflowRun.head_branch}`);
              return;
            }
            
            core.info(`Found PR #${pr.number}: ${pr.title}`);
            
            // Check if PR has 'fix-with-bob' label
            const hasLabel = pr.labels.some(label => label.name === 'fix-with-bob');
            if (!hasLabel) {
              core.info('PR does not have fix-with-bob label, skipping');
              core.setOutput('should_run', 'false');
              return;
            }
            
            // Get all reviews for this PR
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            core.info(`Found ${reviews.length} reviews`);
            
            // Find the most recent review that is a comment or change request
            let latestReview = null;
            for (let i = reviews.length - 1; i >= 0; i--) {
              const review = reviews[i];
              if (review.state === 'COMMENTED' || review.state === 'CHANGES_REQUESTED') {
                latestReview = review;
                break;
              }
            }
            
            if (!latestReview) {
              core.info('No recent review with comments or change requests found, skipping');
              core.setOutput('should_run', 'false');
              return;
            }
            
            core.info(`Latest review ID: ${latestReview.id} by ${latestReview.user.login}`);
            core.info(`Review state: ${latestReview.state}`);
            
            // Set outputs
            core.setOutput('should_run', 'true');
            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_title', pr.title);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('review_id', latestReview.id);
            core.setOutput('reviewer', latestReview.user.login);
            
            core.info(`Will process PR #${pr.number}: ${pr.title}`);
            core.info(`Review ID: ${latestReview.id} by ${latestReview.user.login}`);
      
      - name: Checkout repository
        if: steps.get_pr.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.get_pr.outputs.head_repo }}
          ref: ${{ steps.get_pr.outputs.head_ref }}
          fetch-depth: 0  # Full history for better context
          token: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
      
      - name: Setup Node.js
        if: steps.get_pr.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Bob Shell
        if: steps.get_pr.outputs.should_run == 'true'
        run: |
          echo "Installing Bob Shell..."
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm

          # Verify installation
          if command -v bob &> /dev/null; then
            echo "Bob Shell installed successfully"
            bob --version
          else
            echo "Bob Shell installation failed"
            exit 1
          fi
      
      - name: Authenticate Bob Shell
        if: steps.get_pr.outputs.should_run == 'true'
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Configuring Bob Shell authentication..."
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY secret is not set"
            exit 1
          fi
          # Bob Shell uses BOBSHELL_API_KEY environment variable for authentication
          echo "Bob Shell authentication configured successfully"
      
      - name: Get PR and Review Details
        if: steps.get_pr.outputs.should_run == 'true'
        id: pr_details
        env:
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.get_pr.outputs.pr_number }}"
          REVIEW_ID="${{ steps.get_pr.outputs.review_id }}"
          
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "pr_title=${{ steps.get_pr.outputs.pr_title }}" >> $GITHUB_OUTPUT
          echo "review_id=${REVIEW_ID}" >> $GITHUB_OUTPUT
          echo "reviewer=${{ steps.get_pr.outputs.reviewer }}" >> $GITHUB_OUTPUT
          
          # Get all review comments from this review
          echo "Fetching review comments..."
          COMMENTS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}/comments" \
            --jq '.[] | "File: \(.path)\nLine: \(.line // .original_line)\nComment: \(.body)\n---"')
          
          # Save comments to file for use in prompt
          echo "${COMMENTS}" > /tmp/review_comments.txt
          
          # Also get the review body if it exists
          REVIEW_BODY=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}" \
            --jq '.body // ""')
          
          if [ -n "${REVIEW_BODY}" ]; then
            echo "Review Summary: ${REVIEW_BODY}" >> /tmp/review_comments.txt
          fi
          
          echo "Review comments saved to /tmp/review_comments.txt"
          cat /tmp/review_comments.txt
      
      - name: Configure Git
        if: steps.get_pr.outputs.should_run == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Execute Bob to Address Review Comments
        if: steps.get_pr.outputs.should_run == 'true'
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
          PR_NUMBER: ${{ steps.pr_details.outputs.pr_number }}
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          # Read review comments
          REVIEW_COMMENTS=$(cat /tmp/review_comments.txt)
          
          # Create a comprehensive prompt for Bob Shell
          PROMPT="Address PR review comments for PR #${PR_NUMBER}: ${{ steps.get_pr.outputs.pr_title }}

          Repository: ${{ github.repository }}
          Reviewer: ${{ steps.get_pr.outputs.reviewer }}

          Review Comments:
          ${REVIEW_COMMENTS}

          Please analyze all the review comments above and make the necessary code changes to address each point of feedback.
          For each comment:
          1. Understand the concern or suggestion
          2. Make the appropriate code changes
          3. Ensure the changes follow best practices
          4. Make sure all related code is updated consistently

          Be thorough and address every comment. If a comment is unclear or requires clarification, make your best judgment based on the context."

          # --accept-license: required on first run in a fresh CI environment
          # --yolo: required to enable file writing (disabled by default)
          bob --accept-license --yolo -p "${PROMPT}"
      
      - name: Check for Changes
        if: steps.get_pr.outputs.should_run == 'true'
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
            
            # Get list of changed files for summary
            CHANGED_FILES=$(git diff --name-only | tr '\n' ', ' | sed 's/,$//')
            echo "changed_files=${CHANGED_FILES}" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi
      
      - name: Commit and Push Changes
        if: steps.get_pr.outputs.should_run == 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          git add -A
          git reset .bob/ || true
          git commit -m "Address review comments from @${{ steps.pr_details.outputs.reviewer }}

          Automatically generated by Bob Shell to address review feedback.
          Review ID: ${{ steps.pr_details.outputs.review_id }}"
          
          # Push to the PR branch
          git push
      
      - name: Generate Responses for Review Comments
        if: steps.get_pr.outputs.should_run == 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr_details.outputs.pr_number }}"
          REVIEW_ID="${{ steps.pr_details.outputs.review_id }}"
          
          # Get all comments from this review with their details
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}/comments" \
            --jq '.[] | {id: .id, path: .path, line: (.line // .original_line), body: .body}' > /tmp/comments.json
          
          # Process each comment and generate a response
          jq -c '.' /tmp/comments.json | while read -r comment; do
            COMMENT_ID=$(echo "$comment" | jq -r '.id')
            COMMENT_PATH=$(echo "$comment" | jq -r '.path')
            COMMENT_LINE=$(echo "$comment" | jq -r '.line')
            COMMENT_BODY=$(echo "$comment" | jq -r '.body')
            
            echo "Processing comment ${COMMENT_ID} on ${COMMENT_PATH}:${COMMENT_LINE}"
            
            # Get the diff for the file to show what changed
            FILE_DIFF=$(git diff HEAD~1 HEAD -- "${COMMENT_PATH}" 2>/dev/null || echo "File changes not available")
            
            # Create a prompt for Bob to generate a specific response
            RESPONSE_PROMPT="Generate a brief, polite, and professional response to this code review comment.

          Review Comment:
          File: ${COMMENT_PATH}
          Line: ${COMMENT_LINE}
          Comment: ${COMMENT_BODY}

          Changes Made to This File:
          ${FILE_DIFF}

          Write a response that:
          1. Acknowledges the reviewer's feedback
          2. Briefly explains what changes were made to address it (1-2 sentences)
          3. Is polite and professional
          4. Does not include greetings or sign-offs
          5. Is concise (2-3 sentences maximum)

          Response:"
            
            # Use Bob to generate the response
            RESPONSE=$(bob -p "${RESPONSE_PROMPT}" 2>/dev/null | head -n 10)
            
            # If Bob's response is empty or too long, use a default
            if [ -z "${RESPONSE}" ] || [ ${#RESPONSE} -gt 500 ]; then
              RESPONSE="Thank you for the feedback. I've updated the code in ${COMMENT_PATH} to address your concern. Please review the changes."
            fi
            
            # Save the response for this comment
            echo "${COMMENT_ID}|${RESPONSE}" >> /tmp/responses.txt
          done
      
      - name: Post Responses to Review Comments
        if: steps.get_pr.outputs.should_run == 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr_details.outputs.pr_number }}"
          
          # Post each response
          if [ -f /tmp/responses.txt ]; then
            while IFS='|' read -r COMMENT_ID RESPONSE; do
              echo "Posting response to comment ${COMMENT_ID}"
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/comments/${COMMENT_ID}/replies" \
                -f body="✅ ${RESPONSE}" || echo "Failed to reply to comment ${COMMENT_ID}"
            done < /tmp/responses.txt
          fi
          
          # Also add a general comment on the PR
          gh pr comment ${PR_NUMBER} \
            --body "Thank you @${{ steps.pr_details.outputs.reviewer }} for the review! I've addressed all the comments and updated the following files:

          **Changed files:** ${{ steps.changes.outputs.changed_files }}

          Please let me know if any further changes are needed."
      
      - name: Comment on PR - No Changes
        if: steps.get_pr.outputs.should_run == 'true' && steps.changes.outputs.has_changes == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          gh pr comment ${{ steps.pr_details.outputs.pr_number }} \
            --body "🤖 Bob Shell analyzed the review comments from @${{ steps.pr_details.outputs.reviewer }} but did not generate any code changes. The comments may require manual intervention or clarification."
      
      - name: Handle Errors
        if: steps.get_pr.outputs.should_run == 'true' && failure()
        env:
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          gh pr comment ${{ steps.pr_details.outputs.pr_number }} \
            --body "❌ Bob Shell encountered an error while trying to address the review comments. Please check the workflow logs for details."

# Made with Bob
