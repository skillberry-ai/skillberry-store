name: pull_request

on:
  pull_request:
    branches: [ main ]

jobs:
  pull_request:
    name: pull-request
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: install make
      run: sudo apt-get install make
    - name: checkout
      uses: actions/checkout@v6
    - name: create-venv
      run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
    - name: run-make
      run: |
          source .venv/bin/activate
          make ci-pull-request