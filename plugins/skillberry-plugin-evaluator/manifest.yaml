name: Content Evaluator
slug: evaluator
version: 0.1.0
description: Evaluate content quality and performance using LLM
plugin_type: evaluator
sdk_version: ^0.1
has_api: true
required_env:
  - name: LLM_PROVIDER
    description: LLM provider (e.g. openai.async)
    required: true
  - name: LLM_MODEL
    description: LLM model name
    required: false
    default: gpt-4
