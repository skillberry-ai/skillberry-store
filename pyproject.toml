  "langgraph-sdk>=0.1.70",
  "langsmith>=0.3.22",
  "markdown-it-py>=3.0.0",
  "markupsafe>=3.0.2",
  "mccabe>=0.6.1",
  "mcp>=1.4.1",
  "mdurl>=0.1.2",
  "mpmath>=1.3.0",
