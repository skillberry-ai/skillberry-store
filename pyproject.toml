  "huggingface-hub>=0.29.1",
  "idna",
  "iniconfig>=2.0.0",
  "jdk4py>=21.0.4.2",
  "jinja2>=3.1.5",
  "jiter>=0.9.0",
  "joblib>=1.4.2",
  "jsonpatch>=1.33",
  "jsonpointer>=3.0.0",
  "langchain-core>=0.3.49",
  "langchain-mcp-adapters>=0.0.6",
  "langchain-openai>=0.3.1",
  "langgraph>=0.2.68",
  "langgraph-checkpoint>=2.1.0",
