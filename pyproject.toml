[project.optional-dependencies]

# Development dependencies
dev = [
  "black>=22.3.0",
  "skillberry-store-sdk"
]

# Plugin dependencies
plugin-creator = [
  "skillberry-plugin-creator>=0.2.0",
]

plugin-evaluator = [
  "skillberry-plugin-evaluator>=0.2.0",
]

plugin-security = [
  "skillberry-plugin-security>=0.1.0",
]

plugin-dedupe = [
  "skillberry-plugin-dedupe>=0.1.0",
]

plugin-mcp-importer = [
  "skillberry-plugin-mcp-importer>=0.1.0",
]

plugin-anthropic-skill-generator = [
  "skillberry-plugin-anthropic-skill-generator>=0.1.0",
]

plugin-kagenti-approver = [
  "skillberry-plugin-kagenti-approver>=0.1.0",
]

plugin-sast = [
  "skillberry-plugin-sast>=0.1.0",
  "llm-switchboard"
]

plugin-skill-optimizer = [
  "skillberry-plugin-skill-optimizer>=0.1.0",
]

plugin-simulate = [
  "skillberry-plugin-simulate>=0.1.0",
]

plugin-provenance = [
  "skillberry-plugin-provenance>=0.1.0",
]

plugin-doc-generator = [
  "skillberry-plugin-doc-generator>=0.1.0",
]

plugin-dependency-tracker = [
  "skillberry-plugin-dependency-tracker>=0.1.0",
]

plugin-ask-runspace = [
  "skillberry-plugin-ask-runspace>=0.1.0",
]

plugin-dast = [
  "skillberry-plugin-dast>=0.1.0",
]

plugin-skillssh-importer = [
  "skillberry-plugin-skillssh-importer>=0.1.0",
]

# Install all plugins
plugins-all = [
  "skillberry-plugin-creator>=0.2.0",
  "skillberry-plugin-evaluator>=0.2.0",
  "skillberry-plugin-security>=0.1.0",
  "skillberry-plugin-dedupe>=0.1.0",
  "skillberry-plugin-mcp-importer>=0.1.0",
  "skillberry-plugin-anthropic-skill-generator>=0.1.0",
  "skillberry-plugin-kagenti-approver>=0.1.0",
  "skillberry-plugin-sast>=0.1.0",
  "skillberry-plugin-skill-optimizer>=0.1.0",
  "skillberry-plugin-simulate>=0.1.0",
  "skillberry-plugin-provenance>=0.1.0",
  "skillberry-plugin-doc-generator>=0.1.0",
  "skillberry-plugin-dependency-tracker>=0.1.0",
  "skillberry-plugin-ask-runspace>=0.1.0",
  "skillberry-plugin-dast>=0.1.0",
  "skillberry-plugin-skillssh-importer>=0.1.0",
]

test = [
  "skillberry-store[dev,plugins-all]"
]

[tool.uv.sources]
skillberry-store-sdk = { path = "client/python/skillberry_store_sdk", editable = true }
skillberry-plugin-creator = { path = "plugins/skillberry-plugin-creator", editable = true }
skillberry-plugin-evaluator = { path = "plugins/skillberry-plugin-evaluator", editable = true }
skillberry-plugin-security = { path = "plugins/skillberry-plugin-security", editable = true }
skillberry-plugin-dedupe = { path = "plugins/skillberry-plugin-dedupe", editable = true }
skillberry-plugin-mcp-importer = { path = "plugins/skillberry-plugin-mcp-importer", editable = true }
skillberry-plugin-anthropic-skill-generator = { path = "plugins/skillberry-plugin-anthropic-skill-generator", editable = true }
skillberry-plugin-kagenti-approver = { path = "plugins/skillberry-plugin-kagenti-approver", editable = true }
skillberry-plugin-sast = { path = "plugins/skillberry-plugin-sast", editable = true }
skillberry-plugin-skill-optimizer = { path = "plugins/skillberry-plugin-skill-optimizer", editable = true }
skillberry-plugin-simulate = { path = "plugins/skillberry-plugin-simulate", editable = true }
skillberry-plugin-provenance = { path = "plugins/skillberry-plugin-provenance", editable = true }
skillberry-plugin-doc-generator = { path = "plugins/skillberry-plugin-doc-generator", editable = true }
skillberry-plugin-dependency-tracker = { path = "plugins/skillberry-plugin-dependency-tracker", editable = true }
skillberry-plugin-ask-runspace = { path = "plugins/skillberry-plugin-ask-runspace", editable = true }
skillberry-plugin-dast = { path = "plugins/skillberry-plugin-dast", editable = true }
skillberry-plugin-skillssh-importer = { path = "plugins/skillberry-plugin-skillssh-importer", editable = true }
llm-client = { path = "skillberry-common/packages/llm-client", editable = true }
torch = { index = "pytorch-cpu" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
skillberry_store = ["ui/**/*"]

[project.scripts]
sbs-srv = "skillberry_store.main:main"
